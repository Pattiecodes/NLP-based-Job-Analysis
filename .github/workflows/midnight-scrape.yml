name: Midnight Scrape

on:
  schedule:
    # 16:00 UTC = 12:00 AM (UTC+8)
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  trigger-scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        job_query:
          - 'software engineer'
          - 'data scientist'
          - 'nurse'
          - 'teacher'
          - 'accountant'
    steps:
      - name: Trigger backend scraping endpoint for ${{ matrix.job_query }}
        env:
          SCRAPE_API_URL: ${{ secrets.SCRAPE_API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SCRAPE_API_URL" ]; then
            echo "SCRAPE_API_URL secret is not set"
            exit 1
          fi

          curl -sS -X POST "$SCRAPE_API_URL/api/scraping/jobs/trigger" \
            -H "Content-Type: application/json" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -d '{"query":"${{ matrix.job_query }}","limit":100,"source":"scheduler"}' \ 
            || echo "Failed to scrape ${{ matrix.job_query }}"
